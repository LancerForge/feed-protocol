name: Publish to PyPI

# Builds the package and uploads it to PyPI whenever you publish a GitHub
# Release, or when you run this workflow manually from the Actions tab.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret required.
# One-time setup on PyPI before the first run: see the "PyPI Trusted Publishing"
# section in CONTRIBUTING.md / the note the maintainer was given.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
